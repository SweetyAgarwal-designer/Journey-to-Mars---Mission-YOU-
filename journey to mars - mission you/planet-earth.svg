<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-label="Stylized realistic Earth">
  <defs>
    <clipPath id="earthClip">
      <circle cx="600" cy="600" r="560"/>
