    <radialGradient id="earthOcean" cx="34%" cy="30%" r="74%">
      <stop offset="0%" stop-color="#77a9ff"/>
      <stop offset="18%" stop-color="#326bc8"/>
      <stop offset="46%" stop-color="#10388c"/>
      <stop offset="78%" stop-color="#081a4d"/>
      <stop offset="100%" stop-color="#020611"/>
